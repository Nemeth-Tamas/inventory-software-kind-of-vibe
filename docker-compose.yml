services:
  postgres:
    image: postgres:16-alpine
    container_name: inventory-db
    environment:
      POSTGRES_DB: inventory
      POSTGRES_USER: inventory_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secure_dev_pass_123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-15432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inventory_user -d inventory"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: inventory-redis
    ports:
      - "${REDIS_PORT:-16379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    container_name: inventory-backend
    environment:
      - DATABASE_URL=postgresql+asyncpg://inventory_user:${POSTGRES_PASSWORD:-secure_dev_pass_123}@postgres:5432/inventory
      - REDIS_URL=redis://redis:6379/0
      - BILLINGO_API_KEY=${BILLINGO_API_KEY}
      - ALLOW_MOCK_BILLINGO=true
      - ALLOW_SEEDING=true
      - ADMIN_USER=admin
      - ADMIN_PASSWORD=admin123
      - JWT_SECRET=${JWT_SECRET:-some_super_secret_jwt_key_here}
    ports:
      - "${BACKEND_PORT:-18000}:18000"
    volumes:
      - ./backups:/app/backups
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: ./backend
    container_name: inventory-worker
    command: celery -A tasks worker --loglevel=info
    environment:
      - DATABASE_URL=postgresql+asyncpg://inventory_user:${POSTGRES_PASSWORD:-secure_dev_pass_123}@postgres:5432/inventory
      - REDIS_URL=redis://redis:6379/0
      - BILLINGO_API_KEY=${BILLINGO_API_KEY}
      - ALLOW_MOCK_BILLINGO=true
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  backup:
    build:
      context: ./backend
    container_name: inventory-backup
    command: python backup_manager.py daemon
    environment:
      - DATABASE_URL=postgresql+asyncpg://inventory_user:${POSTGRES_PASSWORD:-secure_dev_pass_123}@postgres:5432/inventory
    volumes:
      - ./backups:/app/backups
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "cat", "/tmp/backup_healthy"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: inventory-frontend
    ports:
      - "${FRONTEND_PORT:-18080}:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
