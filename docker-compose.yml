services:
  postgres:
    image: postgres:16-alpine
    container_name: inventory-db
    environment:
      POSTGRES_DB: inventory
      POSTGRES_USER: inventory_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inventory_user -d inventory"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: inventory-redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    container_name: inventory-backend
    environment:
      - APP_ENV=production
      - DATABASE_URL=postgresql+asyncpg://inventory_user:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/inventory
      - REDIS_URL=redis://redis:6379/0
      - BILLINGO_API_KEY=${BILLINGO_API_KEY:-}
      - ALLOW_MOCK_BILLINGO=false
      - ALLOW_SEEDING=false
      - ADMIN_USER=${ADMIN_USER:?ADMIN_USER is required}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:?ADMIN_PASSWORD is required}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-}
    ports:
      - "${BACKEND_PORT:-18000}:18000"
    volumes:
      - ./backups:/app/backups
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:18000/api/health/ready')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  worker:
    build:
      context: ./backend
    container_name: inventory-worker
    command: celery -A tasks worker --loglevel=info
    environment:
      - APP_ENV=production
      - DATABASE_URL=postgresql+asyncpg://inventory_user:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/inventory
      - REDIS_URL=redis://redis:6379/0
      - BILLINGO_API_KEY=${BILLINGO_API_KEY:-}
      - ALLOW_MOCK_BILLINGO=false
      - ADMIN_USER=${ADMIN_USER:?ADMIN_USER is required}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:?ADMIN_PASSWORD is required}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  backup:
    build:
      context: ./backend
    container_name: inventory-backup
    command: python backup_manager.py daemon
    environment:
      - APP_ENV=production
      - DATABASE_URL=postgresql+asyncpg://inventory_user:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/inventory
      - ADMIN_USER=${ADMIN_USER:?ADMIN_USER is required}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:?ADMIN_PASSWORD is required}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
    volumes:
      - ./backups:/app/backups
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "cat", "/tmp/backup_healthy"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: inventory-frontend
    ports:
      - "${FRONTEND_PORT:-18080}:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
