name: CI

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "master" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-format:
    name: Lint and Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Ruff
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Run Ruff Linter
        run: ruff check .

      - name: Run Ruff Formatter Check
        run: ruff format --check .

  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: inventory_user
          POSTGRES_PASSWORD: secure_dev_pass_123
          POSTGRES_DB: inventory
        ports:
          - 15432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 16379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://inventory_user:secure_dev_pass_123@localhost:15432/inventory
      REDIS_URL: redis://localhost:16379/0
      JWT_SECRET: super_secret_jwt_token_for_jwt_auth_1234567890
      ADMIN_USER: admin
      ADMIN_PASSWORD: admin123
      APP_ENV: development

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: 'backend/requirements.txt'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest pytest-asyncio pytest-cov httpx ruff

      - name: Run migrations
        run: |
          cd backend
          alembic upgrade head

      - name: Run tests with pytest
        run: |
          cd backend
          pytest

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Type check frontend
        run: |
          cd frontend
          npx tsc --noEmit

      - name: Build frontend
        run: |
          cd frontend
          npm run build

      - name: Run frontend tests
        run: |
          cd frontend
          npm run test

  docker-compose-check:
    name: Docker Compose Config Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Validate Production Docker Compose Configuration
        run: |
          POSTGRES_PASSWORD=mock JWT_SECRET=mock ADMIN_USER=mock ADMIN_PASSWORD=mock docker compose -f docker-compose.yml config

      - name: Validate Development Docker Compose Configuration
        run: |
          POSTGRES_PASSWORD=mock JWT_SECRET=mock ADMIN_USER=mock ADMIN_PASSWORD=mock docker compose -f docker-compose.yml -f docker-compose.dev.yml config

  docker-build:
    name: Docker Images Build Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Images via Compose
        run: |
          POSTGRES_PASSWORD=mock JWT_SECRET=mock ADMIN_USER=mock ADMIN_PASSWORD=mock docker compose build
